<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilaterasi SPMB Banjarmasin</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>
<body>

<div class="container">

    <div id="sidebar">

    <h2>☰ Menu</h2>

    <button id="dashboardTab">
        🏠 Dashboard
    </button>

    <button id="historyTab">
        📜 Riwayat
    </button>

    <button id="aboutTab">
        ℹ️ Tentang
    </button>

</div>

  <div id="dashboardPage"
    class="left-panel">

        <h1>🏠 Trilaterasi SPMB Banjarmasin</h1>

        <p>
            Masukkan jarak rumah ke SMA yang diketahui.
            Minimal 3 sekolah.
        </p>

        <div id="schoolInputs"></div>

        <div class="button-group">

            <button id="calculateBtn">
                Hitung Lokasi
            </button>

            <button id="resetBtn">
                Reset
            </button>

        </div>

      <div id="result">

    <h2>Hasil</h2>

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-title">
                📍 Latitude
            </div>

            <div
            id="latResult"
            class="stat-value">

                -

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                📍 Longitude
            </div>

            <div
            id="lonResult"
            class="stat-value">

                -

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                📏 Error
            </div>

            <div
            id="errorResult"
            class="stat-value">

                -

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                🧠 Kepercayaan
            </div>

            <div
            id="confidenceResult"
            class="stat-value">

                -

            </div>

        </div>

    </div>

    <p>
        Akurasi:
        <span id="accuracyBadge">-</span>
    </p>

            <p>
                Sekolah digunakan:
            </p>

            <ul id="usedSchools"></ul>

            <button id="copyBtn">
                Salin Koordinat
            </button>

            <button id="downloadPdfBtn">
                📄 Unduh PDF
            </button>

            <a
                id="mapsLink"
                href="#"
                target="_blank">

                <button>
                    Buka Google Maps
                </button>

            </a>

        </div>

    </div>

    <div class="right-panel">

        <div id="map"></div>

    </div>

   <div id="historyPage">

        <h2>📜 Riwayat Perhitungan</h2>

        <div id="historyList">

            Belum ada riwayat

        </div>

        <button id="clearHistoryBtn">

            🗑 Hapus Riwayat

        </button>
        
    </div>
    
</div>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
<script src="script.js"></script>

</body>
</html>
